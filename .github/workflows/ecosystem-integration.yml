name: Ecosystem Integration Test

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    uses: diggsweden/wallet-ecosystem/.github/workflows/reusable-integration.yml@9743c5837db2734cf1023636e40bcb6c376b599a # main
    with:
      service-name: wallet-attribute-attestation
      service-repo: ${{ github.repository }}
      service-ref: ${{ github.event.pull_request.head.sha || github.ref }}
